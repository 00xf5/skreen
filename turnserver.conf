# TURN Server Configuration for SCON WebRTC
listening-port=3478
tls-listening-port=5349

# Authentication
lt-cred-mech
user=scon:scon_super_secret_webrtc_key
realm=scon.local

# Performance tuning
total-quota=100
bps-capacity=0
stale-nonce=600
no-loopback-peers
no-multicast-peers

# Logging
log-file=stdout
